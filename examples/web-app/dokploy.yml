# yaml-language-server: $schema=https://raw.githubusercontent.com/pythoninthegrass/dokploy_seed/main/schemas/dokploy.schema.json

# Web application with worker, scheduler, and monitoring
# GitHub-sourced app + Docker services

project:
  name: my-web-app
  description: |
    Web application with async task processing

  env_targets: [web, worker, beat]

  deploy_order:
    - [redis]
    - [web, worker, beat, flower]

github:
  owner: your-org
  repository: your-app
  branch: main

environments:
  prod:
    apps:
      web:
        domain:
          host: app.example.com
          port: 8000
          https: true
          certificateType: letsencrypt
      flower:
        domain:
          host: flower.example.com
          port: 5555
          https: true
          certificateType: letsencrypt
  dev:
    github:
      branch: develop
    apps:
      web:
        domain:
          host: app-dev.example.com
          port: 8000
          https: true
          certificateType: letsencrypt

apps:
  - name: redis
    source: docker
    dockerImage: redis:7-alpine

  - name: web
    source: github

  - name: worker
    source: github
    command: >-
      celery -A myproject worker
      --loglevel=INFO --concurrency=4 --max-tasks-per-child=200

  - name: beat
    source: github
    command: >-
      celery -A myproject beat
      --loglevel=INFO --pidfile=/tmp/celerybeat.pid --schedule=/tmp/celerybeat-schedule

  - name: flower
    source: docker
    dockerImage: mher/flower:2.0.1
    command: >-
      celery --broker=redis://{redis}:6379/0 flower
      --port=5555 --address=0.0.0.0
    env: |
      TZ=UTC
      CELERY_BROKER_URL=redis://{redis}:6379/0
